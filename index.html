<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LS4YOU – Ma Carte</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>

/* ===== VARIABLES ===== */

:root{
--vert:#95c11f;
--orange:#f39200;
--bleu:#2897d5;
--rose:#d60b52;
--noir:#171718;
--gris-border:#e5e5e5;
--gris-clair:#f5f5f5;
}

body{
margin:0;
font-family:'Nunito Sans',sans-serif;
background:#f2f2f2;
}

/* ===== NAV ===== */

nav{
background:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid var(--vert);
font-weight:800;
}

button{
cursor:pointer;
}

/* ===== SLIDE ===== */

.slide{
height:calc(100vh - 60px);
display:flex;
}

/* ===== CARTE LAYOUT ===== */

.mc-container{
display:flex;
width:100%;
height:100%;
}

.mc-sidebar{
width:380px;
background:white;
border-right:1px solid var(--gris-border);
display:flex;
flex-direction:column;
}

.mc-header{
padding:18px;
border-bottom:1px solid var(--gris-border);
display:flex;
justify-content:space-between;
align-items:center;
font-weight:900;
}

.mc-body{
padding:18px;
overflow-y:auto;
flex:1;
}

#map{
flex:1;
}

/* ===== BOUTONS ===== */

.mc-btn{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-weight:800;
margin-bottom:16px;
}

.mc-btn-blue{
background:var(--bleu);
color:white;
}

.mc-btn-green{
background:var(--vert);
color:white;
}

/* ===== CONSIGNES ===== */

.mc-consignes-mini{
margin:14px 0 18px;
padding:14px;
border:2px solid var(--gris-border);
border-radius:14px;
background:white;
}

.mc-consignes-mini-title{
font-weight:900;
font-size:13px;
margin-bottom:10px;
}

.mc-mini-card{
padding:10px 12px;
border-radius:12px;
font-weight:800;
font-size:12px;
margin-bottom:8px;
border-left:6px solid;
}

.rose{border-left-color:var(--rose);background:#fff0f4;}
.bleu{border-left-color:var(--bleu);background:#eff6ff;}
.vert{border-left-color:var(--vert);background:#f7fee7;}
.orange{border-left-color:var(--orange);background:#fff7ed;}

.mc-mini-hint{
margin-top:10px;
font-size:12px;
font-weight:700;
color:#555;
}

.mc-empty{
margin-top:20px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<nav>
<div>LS4YOU – Ma Carte</div>
<div>20 / 22</div>
</nav>

<section class="slide" id="s19">
<div class="mc-container">

<!-- SIDEBAR -->
<div class="mc-sidebar">

<div class="mc-header">
Vos repères
<span id="mc-count">0</span>
</div>

<div class="mc-body">

<button class="mc-btn mc-btn-blue" onclick="alert('Wizard à connecter ici')">
📍 Ajouter un repère
</button>

<div class="mc-consignes-mini">
<div class="mc-consignes-mini-title">Construire ta carte</div>

<div class="mc-mini-card rose">01 Qui je connais / qui me connaît</div>
<div class="mc-mini-card bleu">02 Ce que je sais faire ici</div>
<div class="mc-mini-card vert">03 Mes solutions concrètes</div>
<div class="mc-mini-card orange">04 Là où je me ressource</div>

<div class="mc-mini-hint">Objectif : 3 repères minimum par bloc.</div>
</div>

<div class="mc-empty">
Votre carte est vierge.<br>
Commencez à ajouter vos repères.
</div>

</div>
</div>

<!-- MAP -->
<div id="map"></div>

</div>
</section>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>

/* ===== INIT CARTE ===== */

let map;

function initMap(){
if(map) return;

map = L.map('map').setView([43.483,-1.533],12);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
{maxZoom:19}
).addTo(map);
}

window.onload = initMap;

</script>

</body>
</html>
