<section class="slide" id="s19">
  <div class="mc-container">
      
      <!-- PANNEAU GAUCHE -->
      <div class="mc-sidebar">
          
          <!-- VUE LISTE -->
          <div id="mc-view-list" class="mc-view mc-view-active">
              <div class="mc-header">
                  <h2>Vos repères</h2>
                  <span id="mc-count" class="mc-badge">0</span>
              </div>

              <div class="mc-body">
                  <button class="mc-btn mc-btn-blue" onclick="mcOpenWizard()">
                      <span style="font-size:20px;">📍</span> Ajouter un repère
                  </button>

                  <div id="mc-empty" class="mc-empty">
                      <div class="icon">🗺️</div>
                      <p>Votre carte est vierge.</p>
                      <span>Commencez à ajouter vos repères.</span>
                  </div>

                  <div id="mc-list-container"></div>
              </div>
          </div>

          <!-- WIZARD -->
          <div id="mc-view-wizard" class="mc-view mc-view-right">
              <div class="mc-header" style="justify-content:flex-start;gap:15px;">
                  <button class="mc-back-btn" onclick="mcCloseWizard()">←</button>
                  <h2 style="font-size:16px;">Nouveau repère</h2>
              </div>

              <div class="mc-body" id="mc-wiz-scroll">

                  <div id="mc-step-1">
                      <label class="mc-label">Nom du repère</label>
                      <input type="text" id="mc-name" class="mc-input" placeholder="Ex: Mission Locale, Gare, Parc...">

                      <label class="mc-label">Catégorie</label>
                      <div id="mc-cat-grid"></div>

                      <button class="mc-btn mc-btn-blue" onclick="mcGoToSearch()">
                          Suivant ➔
                      </button>
                  </div>

                  <div id="mc-step-2" style="display:none;">
                      <button class="mc-link" onclick="mcBackToStep1()">← Retour</button>

                      <label class="mc-label">Rechercher une adresse</label>
                      <div class="mc-search-box">
                          <input type="text" id="mc-search" class="mc-input mc-search-input"
                                 placeholder="Rechercher..." oninput="mcHandleSearch(this.value)">
                          <span class="mc-search-icon">🔍</span>
                          <div id="mc-loader" class="mc-search-loader"></div>
                      </div>

                      <div id="mc-results" class="mc-results"></div>

                      <div id="mc-info-confirm" class="mc-info">
                          <span>💡</span>
                          <p>Glissez le repère pour ajuster la position.</p>
                      </div>

                      <button id="mc-btn-confirm" class="mc-btn mc-btn-green"
                              style="display:none;" onclick="mcConfirmAdd()">
                          Enregistrer le repère
                      </button>
                  </div>

              </div>
          </div>
      </div>

      <!-- CARTE -->
      <div id="map" style="flex:1;height:100%;"></div>
  </div>

  <div id="mc-toast" class="mc-toast"></div>
</section>
